name: CI

# 触发条件:push 到 main,或针对 main 的 PR
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DASHSCOPE_API_KEY: "sk-test-key-for-ci"
    steps:
      # 1. 拉取仓库代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 安装 uv(官方 action,自带缓存加速)
      - name: 安装 uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      # 3. 同步依赖(含 dev)
      - name: 安装依赖
        run: uv sync

      # 4. 代码检查
      - name: Ruff 检查
        run: uv run ruff check .

      # 5. 格式检查(只检查不修改,有未格式化代码就失败)
      - name: Ruff 格式检查
        run: uv run ruff format --check .

      # 6. 跑单元测试(排除 integration 标记)
      - name: 运行单元测试
        run: uv run pytest -m "not integration"