<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OnCall Agent</title>
  <!-- Markdown 渲染 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>OnCall Agent</h1>
      <div class="actions">
        <label class="upload-btn">
          上传文档
          <input type="file" id="file-input" accept=".md,.txt" hidden />
        </label>
        <button id="diagnose-btn" class="diagnose-btn">一键诊断</button>
        <button id="new-chat-btn" class="ghost-btn">新对话</button>
      </div>
    </header>

    <main id="messages" class="messages">
      <div class="welcome">你好,我是智能 OnCall 助手。问我运维问题,或点击「一键诊断」自动巡检系统。</div>
    </main>

    <footer class="composer">
      <input id="input" type="text" placeholder="输入问题,回车发送…" autocomplete="off" />
      <button id="send-btn">发送</button>
    </footer>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
